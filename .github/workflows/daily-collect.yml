name: Daily Data Collection & Deploy

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect recall data from FDA
        run: npx tsx scripts/collect-recalls.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyze recall data & compute brand scores
        run: npx tsx scripts/analyze-recalls.ts

      - name: Generate daily digest article
        run: npx tsx scripts/generate-content.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate visualizations
        run: npx tsx scripts/generate-images.ts

      - name: Build AnalogJS static site
        run: npm run build

      - name: Commit new data and generated content
        run: |
          git config user.name "Inspector Morsel 🦝"
          git config user.email "inspector-morsel@users.noreply.github.com"
          git add data/ src/content/articles/ public/
          git diff --staged --quiet || git commit -m "chore(data): daily collection $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/analog/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
