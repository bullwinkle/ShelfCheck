name: Weekly Deep Dive

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  deep-dive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect recalls
        run: npm run collect

      - name: Analyze recalls
        run: npm run analyze

      - name: Generate weekly deep dive
        run: npm run generate:deep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate images
        run: npm run generate:images

      - name: Commit and push
        run: |
          git config user.name "Inspector Morsel"
          git config user.email "actions@users.noreply.github.com"
          git add data public src/content
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(content): weekly deep dive $(date -u '+%Y-%m-%d')"
          git push
